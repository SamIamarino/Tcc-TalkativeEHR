<svg width="100%" viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fundo -->
  <rect width="820" height="440" fill="#111" rx="16"/>

  <!-- Título -->
  <text x="410" y="32" text-anchor="middle" fill="rgb(250,249,245)" font-size="16" font-weight="600" font-family="Arial, sans-serif">TalkativeEHR — Fluxo de Dados</text>

  <!-- Alexa -->
  <rect x="30" y="70" width="130" height="60" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
  <text x="95" y="94" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-size="14" font-weight="500" font-family="Arial, sans-serif">Alexa</text>
  <text x="95" y="114" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-size="11" font-family="Arial, sans-serif">"quarto um ligar"</text>

  <!-- Alexa → ESP32 -->
  <line x1="95" y1="130" x2="95" y2="178" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="105" y="158" text-anchor="start" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">UPnP</text>

  <!-- ESP32 -->
  <rect x="30" y="180" width="130" height="60" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="95" y="204" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-size="14" font-weight="500" font-family="Arial, sans-serif">ESP32</text>
  <text x="95" y="224" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-size="11" font-family="Arial, sans-serif">DHT11 + LDR</text>

  <!-- ESP32 → API -->
  <line x1="160" y1="210" x2="278" y2="210" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="219" y="200" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">POST /sensor</text>

  <!-- API Express -->
  <rect x="280" y="160" width="150" height="100" rx="8" fill="rgb(99,56,6)" stroke="rgb(239,159,39)" stroke-width="0.5"/>
  <text x="355" y="195" text-anchor="middle" dominant-baseline="central" fill="rgb(250,199,117)" font-size="14" font-weight="500" font-family="Arial, sans-serif">API Express</text>
  <text x="355" y="215" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)" font-size="11" font-family="Arial, sans-serif">server.js : 3000</text>
  <text x="355" y="235" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)" font-size="10" font-family="Arial, sans-serif">/sensor · /status</text>
  <text x="355" y="250" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)" font-size="10" font-family="Arial, sans-serif">/paciente · /evolucao</text>

  <!-- API → MySQL -->
  <line x1="430" y1="200" x2="528" y2="200" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="479" y="192" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">INSERT / SELECT</text>

  <!-- MySQL → API -->
  <line x1="530" y1="218" x2="432" y2="218" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="479" y="234" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">rows[ ]</text>

  <!-- MySQL -->
  <rect x="530" y="160" width="130" height="100" rx="8" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.5"/>
  <text x="595" y="195" text-anchor="middle" dominant-baseline="central" fill="rgb(181,212,244)" font-size="14" font-weight="500" font-family="Arial, sans-serif">MySQL</text>
  <text x="595" y="215" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-size="11" font-family="Arial, sans-serif">hospital_iot</text>
  <text x="595" y="232" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-size="10" font-family="Arial, sans-serif">LeituraSensor · Paciente</text>
  <text x="595" y="248" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-size="10" font-family="Arial, sans-serif">Medico · EvolucaoPaciente</text>

  <!-- Frontend -->
  <rect x="280" y="340" width="150" height="60" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
  <text x="355" y="364" text-anchor="middle" dominant-baseline="central" fill="rgb(245,196,179)" font-size="14" font-weight="500" font-family="Arial, sans-serif">Frontend</text>
  <text x="355" y="384" text-anchor="middle" dominant-baseline="central" fill="rgb(240,153,123)" font-size="11" font-family="Arial, sans-serif">TalkativeEHR</text>

  <!-- Frontend → API -->
  <line x1="330" y1="340" x2="320" y2="262" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="290" y="305" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">consulta</text>
  <text x="290" y="318" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">periódica</text>

  <!-- API → Frontend -->
  <line x1="378" y1="260" x2="388" y2="338" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="415" y="305" text-anchor="middle" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">JSON</text>

  <!-- Legenda -->
  <text x="660" y="340" text-anchor="middle" fill="rgb(194,192,182)" font-size="12" font-weight="500" font-family="Arial, sans-serif">Legenda</text>
  <line x1="620" y1="358" x2="670" y2="358" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="678" y="362" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">requisição</text>
  <line x1="620" y1="380" x2="670" y2="380" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="678" y="384" fill="rgb(194,192,182)" font-size="11" font-family="Arial, sans-serif">resposta JSON</text>

</svg>
